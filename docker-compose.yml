services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: aether-api:latest
    container_name: aether-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data:ro
      - ./logs/checkpoints:/app/logs/checkpoints:ro
      - ./data/model_cache:/app/data/model_cache
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/stats\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    image: aether-web:latest
    container_name: aether-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - VITE_API_BASE_URL=http://localhost:${API_PORT:-8000}
    profiles:
      - web

