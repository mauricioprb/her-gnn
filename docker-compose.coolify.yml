services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: aether-api:latest
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
      - ARTIFACTS_URL=${ARTIFACTS_URL}
      - ARTIFACTS_SHA256=${ARTIFACTS_SHA256}
      - ETR_CACHE_KEY=${ETR_CACHE_KEY}
      - API_KEY=${API_KEY:-}
      - ENABLE_DOCS=${ENABLE_DOCS:-0}
    volumes:
      - aether-data:/app/data
      - aether-checkpoints:/app/logs/checkpoints
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import urllib.request; urllib.request.urlopen("http://localhost:8000/stats")''',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    networks:
      - aether

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    image: aether-web:latest
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_WEB_80
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aether

volumes:
  aether-data:
  aether-checkpoints:

networks:
  aether:
    driver: bridge
